<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <g opacity="0.1">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="1"/>
  </g>
  
  <circle cx="200" cy="150" r="120" fill="url(#glow1)" opacity="0.3"/>
  <circle cx="1000" cy="480" r="150" fill="url(#glow2)" opacity="0.3"/>
  
  <rect x="80" y="180" width="120" height="120" rx="12" fill="url(#icon-gradient)" opacity="0.9"/>
  <rect x="90" y="190" width="40" height="40" rx="6" fill="white" opacity="0.9"/>
  <rect x="90" y="250" width="40" height="40" rx="6" fill="white" opacity="0.6"/>
  <rect x="150" y="190" width="40" height="40" rx="6" fill="white" opacity="0.6"/>
  <rect x="150" y="250" width="40" height="40" rx="6" fill="white" opacity="0.9"/>
  
  <text x="240" y="240" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="900" fill="white">
    DevSheets
  </text>
  
  <text x="240" y="300" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="500" fill="#94a3b8">
    Spreadsheets for Developers
  </text>
  
  <rect x="240" y="340" width="720" height="80" rx="12" fill="rgba(15, 23, 42, 0.6)"/>
  <text x="260" y="380" font-family="monospace" font-size="24" fill="#38bdf8">
    stars &gt; 50000 &amp;&amp; language == "TypeScript"
  </text>
  
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="icon-gradient" x1="80" y1="180" x2="200" y2="300">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
